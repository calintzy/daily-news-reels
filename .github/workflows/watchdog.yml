name: watchdog

# 발행 부재 감지 + 자가 복구 — 원인 불문(루틴 미실행·빌드 실패·스킵 오판·API 에러) 마커가 없으면 조치.
# 2026-07-23-am(스킵 오판)·07-24-am(cron 변경으로 당일 실행 소멸) 사고 재발 방지.
# 복구 경로(전부 무비용):
#   데이터 있음 + 미발행 → reels.yml 재dispatch (빌드·발행 재시도)
#   데이터 없음         → 경보만 (생성은 백업 클라우드 루틴 07:45/17:45 KST 담당)
# am 발행 ~07:30 KST → 08:30 KST(23:30 UTC 전날) 체크, pm 발행 ~17:30 KST → 18:00 KST(09:00 UTC) 체크.
# GitHub cron은 지연·누락이 있으므로(07-22 실측) 시각은 여유를 두고, 슬롯은 실행 시각(KST)으로 판별한다.
on:
  schedule:
    - cron: "30 23 * * *"   # 08:30 KST — am 회차 점검
    - cron: "0 9 * * *"     # 18:00 KST — pm 회차 점검
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check:
    # 킬스위치를 꺼둔 동안(의도적 발행 중단)은 경보하지 않는다.
    if: vars.PUBLISH_LIVE == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 오늘 회차 발행 마커·데이터 확인
        id: probe
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          HOUR=$(TZ=Asia/Seoul date +%H)
          if [ "$HOUR" -lt 12 ]; then SLOT=am; else SLOT=pm; fi
          STEM="${TODAY}-${SLOT}"
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
          MARKER="published/$STEM"
          if [ -f "$MARKER" ] && [ "$(cat "$MARKER" | tr -d '[:space:]')" != "pending" ]; then
            echo "OK: $MARKER (id=$(cat "$MARKER"))"
            echo "missing=0" >> "$GITHUB_OUTPUT"
          else
            echo "발행 마커 없음/미완: $MARKER"
            echo "missing=1" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "data/$STEM.json" ]; then
            echo "data_exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "data_exists=0" >> "$GITHUB_OUTPUT"
          fi

      - name: 자가 복구 — 데이터 있음이면 빌드·발행 재dispatch
        if: steps.probe.outputs.missing == '1' && steps.probe.outputs.data_exists == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run reels.yml --repo "$GITHUB_REPOSITORY" \
            --field date="${{ steps.probe.outputs.stem }}" --field dry_run=0
          echo "reels.yml 재dispatch 완료 (${{ steps.probe.outputs.stem }})"

      - name: 경보 (텔레그램)
        if: steps.probe.outputs.missing == '1'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ "${{ steps.probe.outputs.data_exists }}" = "1" ]; then
            TEXT="[물어오리] 경보: ${{ steps.probe.outputs.stem }} 미발행 감지 — 데이터는 있어 빌드·발행을 자동 재시도했습니다. 30분 후에도 발행 알림이 없으면 Actions 로그를 점검하세요."
          else
            TEXT="[물어오리] 경보: ${{ steps.probe.outputs.stem }} 미발행 + 데이터도 없음 — 수집 루틴 미실행. 백업 루틴(07:45/17:45)이 생성했는지 확인하고, 없으면 루틴을 수동 실행하세요."
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            --data-urlencode "text=$TEXT"

      - name: 판정 (미발행이면 run을 실패로 표시)
        if: steps.probe.outputs.missing == '1'
        run: exit 1
