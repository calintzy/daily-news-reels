name: reels

on:
  push:
    paths:
      - 'data/*.json'
  workflow_dispatch:
    inputs:
      date:
        description: '게시 대상 날짜 (YYYY-MM-DD). 비우면 오늘(KST)'
        required: false
        default: ''
      dry_run:
        description: '1이면 DRY_RUN(실게시 안 함), 0이면 실게시 시도'
        required: false
        default: '1'

# 같은 리포에서 build/publish가 겹치지 않도록 직렬화
concurrency:
  group: reels-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # data 푸시 또는 dispatch 시 항상 빌드(검증→이미지→렌더→미리보기)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: CJK 폰트 설치 (한글 렌더)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk ffmpeg

      - name: 날짜 결정 (dispatch 입력 → push된 data 파일 → KST 오늘 순)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # push 이벤트면 HEAD 커밋에서 변경된 data/*.json에서 날짜(또는 sample)를 뽑는다
          CHANGED=$(git show --name-only --pretty=format: HEAD -- data/ 2>/dev/null | grep -E '^data/.*\.json$' | head -1)
          if [ -n "$CHANGED" ]; then
            BASE=$(basename "$CHANGED" .json)
            echo "date=$BASE" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: reels 의존성 설치
        working-directory: reels
        run: npm ci

      - name: 데이터 검증 (실패 시 Telegram 알림 후 중단)
        id: validate
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          DATA="data/${{ steps.date.outputs.date }}.json"
          if ! node scripts/validate.mjs "$DATA"; then
            node scripts/telegram.mjs fail "validate FAIL: $DATA — 게시 중단" || true
            exit 1
          fi

      - name: 이미지 생성 (gpt-image-1.5)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IMAGE_QUALITY: medium
        run: node scripts/genimages.mjs "data/${{ steps.date.outputs.date }}.json"

      - name: 렌더 + 음악 합성 + 프리뷰
        run: node scripts/render.mjs "data/${{ steps.date.outputs.date }}.json"

      - name: 산출물 커밋·푸시 (docs/·assets/img)
        run: |
          git config user.name calintzy
          git config user.email byjrasid@gmail.com
          git add docs/videos docs/previews "assets/img/${{ steps.date.outputs.date }}"
          git commit -m "reels build: ${{ steps.date.outputs.date }}" || echo "커밋 변경 없음"
          git push

      - name: Telegram 미리보기 전송
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node scripts/telegram.mjs preview "data/${{ steps.date.outputs.date }}.json"

  publish:
    # workflow_dispatch 전용. 실게시는 dry_run=0 AND PUBLISH_LIVE=1 일 때만.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 날짜 결정 (KST)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: DRY_RUN 결정
        id: mode
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "0" ] && [ "${{ vars.PUBLISH_LIVE }}" = "1" ]; then
            echo "dry=0" >> "$GITHUB_OUTPUT"
          else
            echo "dry=1" >> "$GITHUB_OUTPUT"
          fi

      - name: 릴스 게시 (실패 시 Telegram 알림)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          DRY_RUN: ${{ steps.mode.outputs.dry }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$IG_ACCESS_TOKEN" ] || [ -z "$IG_USER_ID" ]; then
            echo "IG 토큰 미등록 — publish 스킵 (README M0~M7 셋업 후 사용 가능)"
            exit 0
          fi
          DATA="data/${{ steps.date.outputs.date }}.json"
          if ! node scripts/publish.mjs "$DATA"; then
            node scripts/telegram.mjs fail "publish FAIL: $DATA" || true
            exit 1
          fi

      - name: 멱등 마커 커밋·푸시 (containers/·published/)
        if: steps.mode.outputs.dry == '0'
        run: |
          git config user.name calintzy
          git config user.email byjrasid@gmail.com
          git add containers published || true
          git commit -m "reels publish: ${{ steps.date.outputs.date }}" || echo "커밋 변경 없음"
          git push
